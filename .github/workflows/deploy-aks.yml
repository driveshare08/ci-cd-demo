name: Deploy to AKS

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Docker Login
      run: |
        echo ${{ secrets.ACR_PASSWORD }} | docker login \
        ${{ secrets.AZURE_CONTAINER_REGISTRY }} \
        --username ${{ secrets.ACR_USERNAME }} --password-stdin

    - name: Build image
      run: docker build -t ${{ secrets.AZURE_CONTAINER_REGISTRY }}/node-webapp:latest .

    - name: Push image
      run: docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/node-webapp:latest

    - name: Get AKS Context
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER_NAME }} \
          --overwrite-existing

    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
